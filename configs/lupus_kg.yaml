# Knowledge graph extraction config for Lupus research PDFs (GLiNER2).
#
# Run: python scripts/extract_lupus_kg.py --config configs/lupus_kg.yaml
# Or:  python scripts/extract_lupus_kg.py --config configs/lupus_kg.yaml --limit 50 --dry-run

neo4j:
  database: null  # null = use NEO4J_DATABASE from .env

model_id: fastino/gliner2-base-v1

entities:
  labels:
    - disease
    - drug
    - gene_or_protein
    - biomarker
    - symptom
    - cell_type
    - pathway
    - anatomy

relations:
  labels:
    - TREATS
    - BIOMARKER_FOR
    - CAUSES
    - ASSOCIATED_WITH
    - TARGETS
    - INHIBITS
    - EXPRESSED_IN
    - HAS_SYMPTOM
    - INTERACTS_WITH
    - PRODUCED_BY

pipeline:
  batch_size: 16
  entity_threshold: 0.4
  relation_threshold: 0.4

# Medical synonym normalization: maps variant names to canonical form.
# Applied BEFORE entity_id computation so all variants merge to one node.
synonyms:
